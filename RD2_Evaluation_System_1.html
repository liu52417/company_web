<script>
    // 🔑 這是您的雲端大腦網址
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbw2vXcdwUQySt6MkPVXXWc-SAZ_DEriWxwd1T0AXSvaMQTCqb4og8BUdg9biKx-0rk/exec";

    // 這裡我幫您改成了「同步送出」功能，不再是下載檔案
    function submitToCloud() {
        const name = document.getElementById('self_empName').value;
        const id = document.getElementById('self_empID').value;
        const role = document.getElementById('self_empRole').value;
        if(!name || !id || !role) return alert("請填寫姓名、工號並選擇職級！");

        const formData = new URLSearchParams();
        formData.append('name', name);
        formData.append('id', id);
        formData.append('role', document.getElementById('self_empRole').options[document.getElementById('self_empRole').selectedIndex].text);
        formData.append('idp', document.getElementById('idp_text').value);
        formData.append('okr', document.getElementById('okr_text').value);
        formData.append('kpi', document.getElementById('kpi_text').value);

        document.getElementById('statusMessage').innerText = '資料傳送中...';
        fetch(DATABASE_URL, { method: 'POST', body: formData, mode: 'no-cors' })
        .then(() => {
            document.getElementById('statusMessage').innerText = '✅ 報告已成功送到您的雲端資料庫！';
        });
    }
</script>
